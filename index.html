<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YK Ofis — Kurumsal Ürün Kataloğu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F5F3ED;
    --tag:#EDE4CC;
    --tag-edge:#D8C9A3;
    --ink:#1F2A38;
    --ink-soft:#4B5768;
    --muted:#8A8272;
    --gold:#B9800F;
    --gold-deep:#8C6109;
    --green:#2E7D4F;
    --wa:#25D366;
    --wa-deep:#1DA851;
    --line:#D8CFB8;
    --shadow:0 1px 0 rgba(31,42,56,.06), 0 8px 20px -12px rgba(31,42,56,.25);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(31,42,56,.05) 1px, transparent 0);
    background-size:22px 22px;
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{text-decoration:none;color:inherit;}

  /* ---------- HEADER ---------- */
  header{
    position:sticky; top:0; z-index:30;
    background:var(--ink);
    color:#F5F3ED;
    padding:18px 20px 16px;
    box-shadow:0 6px 18px -8px rgba(0,0,0,.35);
  }
  .brand-row{
    display:flex; align-items:center; justify-content:space-between;
    max-width:1100px; margin:0 auto;
  }
  .brand-left{
    display:flex; align-items:center; gap:12px;
  }
  .logo-badge{
    width:46px; height:46px;
    background:var(--tag);
    border:1px solid var(--tag-edge);
    border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    flex:0 0 auto;
    box-shadow:0 2px 6px rgba(0,0,0,.25);
  }
  .logo-badge img{
    width:78%; height:78%;
    object-fit:contain;
  }
  .brand{
    font-family:'Courier Prime',monospace;
    font-weight:700;
    font-size:22px;
    letter-spacing:1px;
  }
  .brand span{color:var(--gold);}
  .brand-sub{
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#B7BFC9;
    margin-top:2px;
  }
  .meta{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:#9AA4B0;
    text-align:right;
    line-height:1.5;
  }
  .search-wrap{
    max-width:1100px; margin:14px auto 0;
    position:relative;
  }
  .search-wrap input{
    width:100%;
    padding:13px 44px 13px 16px;
    border-radius:10px;
    border:1px solid #33424F;
    background:#26333F;
    color:#F5F3ED;
    font-family:'Inter',sans-serif;
    font-size:15px;
    outline:none;
  }
  .search-wrap input::placeholder{color:#7C8998;}
  .search-wrap input:focus{border-color:var(--gold);}
  .search-icon{
    position:absolute; right:14px; top:50%; transform:translateY(-50%);
    font-size:16px; color:#7C8998; pointer-events:none;
  }
  .chips{
    max-width:1100px; margin:12px auto 0;
    display:flex; gap:8px; overflow-x:auto; padding-bottom:4px;
    scrollbar-width:none;
  }
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    padding:7px 13px;
    border-radius:999px;
    border:1px solid #3A4956;
    color:#C9D1DA;
    cursor:pointer;
    white-space:nowrap;
    transition:all .15s ease;
  }
  .chip:hover{border-color:var(--gold);}
  .chip.active{
    background:var(--gold);
    border-color:var(--gold);
    color:#1F2A38;
    font-weight:600;
  }

  /* ---------- MAIN ---------- */
  main{max-width:1100px; margin:0 auto; padding:22px 20px 60px;}
  .result-row{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:14px; font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--muted);
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(230px,1fr));
    gap:16px;
  }

  .card{
    background:var(--tag);
    border:1px solid var(--tag-edge);
    border-radius:14px;
    position:relative;
    box-shadow:var(--shadow);
    display:flex; flex-direction:column;
    overflow:hidden;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .card:hover{transform:translateY(-2px); box-shadow:0 2px 0 rgba(31,42,56,.08), 0 14px 26px -14px rgba(31,42,56,.35);}

  .punch{
    position:absolute; top:12px; left:12px;
    width:14px; height:14px; border-radius:50%;
    background:var(--paper);
    border:1px solid var(--tag-edge);
    box-shadow:inset 0 1px 2px rgba(0,0,0,.15);
    z-index:2;
  }

  .card-img{
    position:relative;
    background:#fff;
    aspect-ratio:1/1;
    width:100%;
    display:flex; align-items:center; justify-content:center;
    padding:20px;
    border-bottom:1px dashed var(--tag-edge);
    overflow:hidden;
  }
  .card-img img{
    width:100%; height:100%;
    object-fit:contain; object-position:center;
    filter:drop-shadow(0 6px 10px rgba(0,0,0,.08));
  }
  .card-img .noimg{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px; color:var(--muted); text-align:center;
  }
  .featured-flag{
    position:absolute; top:10px; right:-6px;
    background:var(--green); color:#fff;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px; font-weight:600; letter-spacing:.5px;
    padding:3px 9px 3px 11px;
    border-radius:3px 0 0 3px;
  }

  .card-body{
    padding:12px 14px 14px;
    display:flex; flex-direction:column; gap:6px; flex:1;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px; letter-spacing:1px; text-transform:uppercase;
    color:var(--gold-deep);
    display:flex; justify-content:space-between;
  }
  .pname{
    font-size:14px; font-weight:600; line-height:1.35;
    color:var(--ink);
    min-height:38px;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .pbrand{font-size:11.5px; color:var(--ink-soft);}

  .price-row{
    display:flex; align-items:center; gap:8px; margin-top:4px;
  }
  .price-box{
    display:inline-flex; align-items:baseline; gap:5px;
    background:#FBEFD1;
    border:1.5px solid var(--gold);
    border-radius:8px;
    padding:4px 10px 3px;
  }
  .price{
    font-family:'IBM Plex Mono',monospace;
    font-weight:700; font-size:21px; color:var(--gold-deep);
    letter-spacing:-.3px;
  }
  .price-unit{font-size:10.5px; color:var(--ink-soft); font-weight:600;}
  .pack-info{
    font-size:11.5px; color:var(--ink-soft);
    font-family:'IBM Plex Mono',monospace;
    display:flex; align-items:center; flex-wrap:wrap; gap:5px;
  }
  .discount-badge{
    display:inline-block;
    background:var(--green); color:#fff;
    font-family:'Inter',sans-serif;
    font-size:10px; font-weight:700; letter-spacing:.2px;
    padding:2px 7px; border-radius:5px;
    white-space:nowrap;
  }
  .colors-row{display:flex; gap:5px; margin-top:2px; flex-wrap:wrap;}
  .cdot{
    display:inline-flex; align-items:center; gap:5px;
    font-size:10px; color:var(--ink-soft); background:#fff;
    border:1px solid var(--tag-edge); border-radius:999px;
    padding:2px 8px 2px 4px;
  }
  .cdot .swatch{
    width:11px; height:11px; border-radius:50%;
    border:1px solid rgba(0,0,0,.15);
    flex:0 0 auto;
  }

  .cta{
    margin-top:auto;
    display:flex; align-items:center; justify-content:center; gap:7px;
    background:var(--wa); color:#fff;
    font-weight:700; font-size:13px;
    padding:10px 12px; border-radius:9px;
    border:none; cursor:pointer;
    transition:background .15s ease;
  }
  .cta:hover{background:var(--wa-deep);}
  .cta svg{width:15px; height:15px; fill:#fff;}

  .empty{
    grid-column:1/-1;
    text-align:center; padding:60px 20px;
    font-family:'IBM Plex Mono',monospace; color:var(--muted);
  }

  footer{
    text-align:center; padding:26px 20px 40px;
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted);
  }

  @media (max-width:480px){
    .brand{font-size:19px;}
    .grid{grid-template-columns:repeat(auto-fill, minmax(155px,1fr));}
    .pname{
      min-height:50px; font-size:12.5px;
      -webkit-line-clamp:3;
    }
    .price{font-size:17px;}
  }
</style>
</head>

const CATS = ["Bant ve Yapıştırıcı", "Bilgisayar Aksesuarları", "Defter ve Not Kağıtları", "Dosyalama ve Arşivleme", "Düzeltme Ürünleri", "Elektronik Ofis", "Etiketleme", "Gıda", "Kalemler", "Kağıt Ürünleri", "Kaşe ve Damga", "Kesim Araçları", "Masaüstü Ofis", "Paketleme ve Ambalaj", "Pil ve Elektronik", "Sunum ve Laminasyon", "Sunum ve Pano", "Temizlik ve Hijyen", "Yazıcı Sarf Malzemeleri", "Zarf ve Postalama"];
const WA_NUMBER = "905418216693";

let activeCat = "Tümü";
let query = "";

const chipsEl = document.getElementById('chips');
const gridEl = document.getElementById('grid');
const resultCountEl = document.getElementById('resultCount');
const searchInput = document.getElementById('searchInput');

function renderChips(){
  const all = ["Tümü", ...CATS];
  chipsEl.innerHTML = all.map(c =>
    `<div class="chip ${c===activeCat?'active':''}" data-cat="${c}">${c}</div>`
  ).join('');
  chipsEl.querySelectorAll('.chip').forEach(el=>{
    el.addEventListener('click', ()=>{
      activeCat = el.dataset.cat;
      renderChips();
      renderGrid();
    });
  });
}

function waLink(p){
  const msg = encodeURIComponent(p.waMsg);
  return `https://wa.me/${WA_NUMBER}?text=${msg}`;
}

function fmtPrice(n){
  if(n===null || n===undefined) return "Fiyat için sor";
  return n.toLocaleString('tr-TR', {minimumFractionDigits:0, maximumFractionDigits:2}) + " ₺";
}

const COLOR_MAP = {
  "kırmızı":"#D32F2F", "mavi":"#1565C0", "yeşil":"#2E7D32", "sarı":"#F9C400",
  "siyah":"#1A1A1A", "beyaz":"#FFFFFF", "pembe":"#E85D9B", "mor":"#7B3FA0",
  "turuncu":"#E8720C", "gri":"#9098A0", "kahverengi":"#6B4226", "lacivert":"#152A54",
  "bej":"#D8C7A1", "altın":"#C9A227", "gümüş":"#B8BEC4", "krom":"#C7CCD1",
  "kraft":"#C2A878", "lila":"#C9A6DE", "şeffaf":"#FFFFFF", "fosforlu sarı":"#E4F500"
};
function colorHex(name){
  return COLOR_MAP[(name||'').trim().toLowerCase()] || "#CCCCCC";
}

function cardHtml(p){
  const img = p.img
    ? `<img src="${p.img}" alt="${p.name}" loading="lazy">`
    : `<div class="noimg">GÖRSEL<br>YOK</div>`;
  let pack = '';
  if(p.packQty && p.packPrice){
    pack = `${p.packLabel || 'Paket'}: ${p.packQty} adet — ${fmtPrice(p.packPrice)}`;
    if(p.price){
      const packUnit = p.packPrice / p.packQty;
      const pct = Math.round((1 - packUnit / p.price) * 100);
      if(pct >= 1){
        pack += ` <span class="discount-badge">%${pct} daha ucuz</span>`;
      }
    }
  }
  const colors = p.colors
    ? `<div class="colors-row">${p.colors.split(',').filter(c=>c.trim()).slice(0,5).map(c=>{
        const name = c.trim();
        return `<span class="cdot"><span class="swatch" style="background:${colorHex(name)}"></span>${name}</span>`;
      }).join('')}</div>`
    : '';
  return `
  <div class="card">
    <div class="punch"></div>
    <div class="card-img">
      ${p.featured ? '<div class="featured-flag">ÖNE ÇIKAN</div>' : ''}
      ${img}
    </div>
    <div class="card-body">
      <div class="eyebrow"><span>${p.subcat || p.cat}</span><span>${p.code}</span></div>
      <div class="pname" title="${p.name.replace(/"/g,'&quot;')}">${p.name}</div>
      ${p.brand ? `<div class="pbrand">${p.brand}</div>` : ''}
      <div class="price-row">
        <div class="price-box">
          <span class="price">${fmtPrice(p.price)}</span>
          <span class="price-unit">/ ${p.unit || 'adet'}</span>
        </div>
      </div>
      ${pack ? `<div class="pack-info">${pack}</div>` : ''}
      ${colors}
      <a class="cta" href="${waLink(p)}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M17.6 6.3A8.7 8.7 0 0 0 4.7 17l-1 3.7 3.8-1a8.7 8.7 0 0 0 12.1-13.4zm-5.6 13a7.2 7.2 0 0 1-3.7-1l-.3-.2-2.7.7.7-2.6-.2-.3a7.2 7.2 0 1 1 6.2 3.4zm4-5.4c-.2-.1-1.3-.6-1.5-.7s-.4-.1-.5.1-.5.7-.7.8-.3.1-.5 0a5.8 5.8 0 0 1-2.9-2.5c-.2-.4.2-.3.6-1.1.1-.1 0-.3 0-.4L9.6 8c-.2-.4-.4-.4-.5-.4h-.5a.9.9 0 0 0-.6.3 2.7 2.7 0 0 0-.8 2 4.7 4.7 0 0 0 1 2.5 10.8 10.8 0 0 0 4.4 3.9c1.6.6 1.6.4 1.9.4a1.6 1.6 0 0 0 1.1-.8 1.4 1.4 0 0 0 .1-.8c-.1-.1-.2-.2-.4-.3z"/></svg>
        WhatsApp'tan Sipariş Ver
      </a>
    </div>
  </div>`;
}

function renderGrid(){
  const q = query.trim().toLowerCase();
  const filtered = PRODUCTS.filter(p=>{
    const inCat = activeCat==="Tümü" || p.cat===activeCat;
    const inQuery = !q ||
      p.name.toLowerCase().includes(q) ||
      (p.code||'').toLowerCase().includes(q) ||
      (p.brand||'').toLowerCase().includes(q) ||
      (p.subcat||'').toLowerCase().includes(q);
    return inCat && inQuery;
  });
  resultCountEl.textContent = `${filtered.length} ürün listeleniyor`;
  gridEl.innerHTML = filtered.length
    ? filtered.map(cardHtml).join('')
    : `<div class="empty">Bu aramayla eşleşen ürün yok.<br>Farklı bir kelime dene ya da doğrudan yaz.</div>`;
}

searchInput.addEventListener('input', (e)=>{
  query = e.target.value;
  renderGrid();
});

renderChips();
renderGrid();
</script>
